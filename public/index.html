<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chat-app</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 로그인 화면 -->
<div id="login-screen">

  <div class="login-card">

    <h1>로그인</h1>

    <button onclick="login()" class="google-login-btn">

      <img
        src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
        width="22"
      >

      Google로 로그인

    </button>

  </div>

</div>

<!-- 앱 -->
<div class="app-container" id="app" style="display:none;">

  <!-- 왼쪽 -->
  <div class="sidebar">

    <h3>접속 중</h3>

    <div id="user-list"></div>

  </div>

  <!-- 오른쪽 -->
  <div class="chat-container">

    <div class="header">

      <h2>chat-app</h2>

    </div>

    <div class="chat-user-bar">

    <div class="chat-user" id="target-user">

      <img id="target-photo">

      <div>

        <div id="target-name"></div>

        <small id="target-status"></small>

      </div>

    </div>

    <div class="chat-user" id="my-user">

      <div id="my-name"></div>

      <img id="my-photo">

    </div>

    </div>

    <!-- 프로필 -->
    <div id="profile" class="profile"></div>
    <button
      id="logout-btn"
      onclick="logout()">
      로그아웃
    </button>
    <!-- 닉네임 -->
    <div id="nickname-box" style="display:none;">

      <div class="nickname-card">

        <img id="profile-image" class="nickname-profile">

        <div class="nickname-input-box">

          <input
            type="text"
            id="nickname"
            placeholder="이름 입력"
          >

          <button onclick="setNickname()">
            ✔
          </button>

        </div>

      </div>

    </div>

    <!-- 메시지 -->
    <div
      id="messages"
      class="messages"
      style="display:none;"
    ></div>

    <!-- 입력 -->
    <div class="input-area" style="display:none;">

      <input
        type="text"
        id="input"
        placeholder="메시지를 입력하세요..."
        disabled
      >

      <button
        id="send-btn"
        onclick="sendMessage()"
        disabled
      >
        전송
      </button>

    </div>

  </div>

</div>

<!-- socket -->
<script src="/socket.io/socket.io.js"></script>

<!-- firebase + chat -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  doc,
  setDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDiTI0TOuqJLbN_4KenjGqVjgaSFOlp750",
    authDomain: "chatapp-c696b.firebaseapp.com",
    projectId: "chatapp-c696b",
    storageBucket: "chatapp-c696b.firebasestorage.app",
    messagingSenderId: "972009621827",
    appId: "1:972009621827:web:766ec3c85a72c785ca47f6",
    measurementId: "G-CQ35HMT987"
  };

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* 로그인 상태 확인 */
onAuthStateChanged(auth, (user) => {

  if (user) {

    document.getElementById('login-screen').style.display =
      'none';

    document.getElementById('app').style.display =
      'flex';

    document.getElementById('profile').innerHTML = `
      <img src="${user.photoURL}">
      <div>
        <div>${user.displayName}</div>
        <small>${user.email}</small>
      </div>
    `;

    document.getElementById('profile-image').src =
      user.photoURL;

    const savedNickname =
      localStorage.getItem('nickname');

    if (savedNickname) {

      nickname = savedNickname;

      document.getElementById('messages').style.display =
        'flex';

      document.querySelector('.input-area').style.display =
        'flex';

      document.getElementById('input').disabled =
        false;

      document.getElementById('send-btn').disabled =
        false;

      document.getElementById('nickname-box').style.display =
        'none';

    } else {

      document.getElementById('nickname-box').style.display =
        'flex';

    }
    onSnapshot(collection(db, "users"), (snapshot) => {

      const userList = document.getElementById("user-list");

      userList.innerHTML = "";

      snapshot.forEach((docItem) => {

        const data = docItem.data();

        if (data.uid === user.uid) return;

        const div = document.createElement("div");

        div.className = "user-item";

        div.innerHTML = `
          <img src="${data.photo}" class="user-photo">

          <div class="user-info">

            <div class="user-name">
              ${data.nickname || data.name}
            </div>

            <div class="last-message">
              채팅 시작하기
            </div>

          </div>
        `;

        div.onclick = () => {

          onSnapshot(
          doc(db,"users",data.uid),
          (snapshot)=>{

          const userData=snapshot.data();

          document.getElementById("target-name").textContent=
          userData.nickname || userData.name;

          document.getElementById("target-status").textContent=
          userData.online
          ?"🟢 온라인"
          :"⚪ 오프라인";

          document.getElementById("target-photo").src=
          userData.photo;

          });

          const roomId =
            [user.uid, data.uid]
            .sort()
            .join("_");

            document.getElementById("target-photo").src =
                data.photo;

            document.getElementById("target-name").textContent =
                data.nickname || data.name;

          const status =
            document.getElementById("target-status");

            status.textContent =
            data.online ? "🟢 온라인" : "⚪ 오프라인";

            document.getElementById("my-photo").src =
                user.photoURL;

            document.getElementById("my-name").textContent =
                nickname;

          localStorage.setItem(
            "currentRoom",
            roomId
          );

          loadMessages(roomId);

        };

        userList.appendChild(div);

      });

    });

  } 
  else {

    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";

    document.getElementById("messages").innerHTML = "";
    document.getElementById("user-list").innerHTML = "";

  }

});

const socket = io();

let nickname =
  localStorage.getItem('nickname') || '';

/* 로그인 */
window.login = async function () {

  try {

    const result =
      await signInWithPopup(auth, provider);

    const user = result.user;

    await setDoc(doc(db, "users", user.uid), {

      uid: user.uid,
      name: user.displayName,
      photo: user.photoURL,
      email: user.email,
      online: true

    }, {merge: true});

    document.getElementById('login-screen').style.display =
      'none';

    document.getElementById('app').style.display =
      'flex';

    document.getElementById('nickname-box').style.display =
      'flex';

    document.getElementById('profile-image').src =
      user.photoURL;

    document.getElementById('profile').innerHTML = `
      <img src="${user.photoURL}">
      <div>
        <div>${user.displayName}</div>
        <small>${user.email}</small>
      </div>
    `;

    const savedNickname =
      localStorage.getItem('nickname');

    if (savedNickname) {

      document.getElementById('nickname').value =
        savedNickname;

    }

    /* 유저 목록 */
    onSnapshot(collection(db, "users"), (snapshot) => {

      const userList =
        document.getElementById('user-list');

      userList.innerHTML = '';

      snapshot.forEach((docItem) => {

        const data = docItem.data();

        if (data.uid === user.uid) return;

        const div = document.createElement('div');

        div.className = 'user-item';

        div.innerHTML = `
          <img src="${data.photo}" class="user-photo">

          <div class="user-info">

            <div class="user-name">
              ${data.nickname || data.name}
            </div>

            <div class="last-message">
              채팅 시작하기
            </div>

          </div>
        `;

        div.onclick = () => {

          const roomId =
            [user.uid, data.uid]
            .sort()
            .join('_');

          localStorage.setItem(
            'currentRoom',
            roomId
          );

          loadMessages(roomId);

        };

        userList.appendChild(div);

      });

    });

  } catch (error) {

    console.error(error);

  }

};

/* 로그아웃 */
window.logout = async function () {

  if (!confirm("로그아웃하시겠습니까?")) return;

  try {

    await setDoc(doc(db, "users", auth.currentUser.uid), {

      online: false

  }, { merge: true });
    
    await signOut(auth);

    localStorage.removeItem("currentRoom");

    document.getElementById("messages").innerHTML = "";
    document.getElementById("user-list").innerHTML = "";

  }
  catch (error) {

    console.error(error);

    alert("로그아웃에 실패했습니다.");

  }

};

/* 닉네임 */
window.setNickname = async function () {

  const input = document.getElementById('nickname');

  nickname = input.value.trim();

  if (!nickname) return;

  localStorage.setItem('nickname', nickname);

  const user = auth.currentUser;

  await setDoc(doc(db, "users", user.uid), {
    nickname: nickname
  }, { merge: true });

  document.getElementById('nickname-box').style.display = 'none';

  document.getElementById('messages').style.display = 'flex';

  document.querySelector('.input-area').style.display = 'flex';

  document.getElementById('input').disabled = false;

  document.getElementById('send-btn').disabled = false;
};

/* 메시지 로드 */
window.loadMessages = function (roomId) {

  const messages =
    document.getElementById('messages');

  onSnapshot(

    query(
      collection(db, "rooms", roomId, "messages"),
      orderBy("time")
    ),

    (snapshot) => {

      messages.innerHTML = '';

      snapshot.forEach((docItem) => {

        const data = docItem.data();

        addMessage(
          `${data.sender}: ${data.text}`,
          data.uid === auth.currentUser.uid
            ? 'sent'
            : 'received',
          new Date(data.time)
            .toLocaleTimeString('ko-KR')
        );

      });

    }

  );

};

/* 메시지 저장 */
async function saveRoomMessage(
  roomId,
  text,
  sender
) {

  await setDoc(

    doc(db, "rooms", roomId),

    {
      lastMessage: text,
      lastTime: Date.now()
    },

    { merge: true }

  );

  await addDoc(

    collection(
      db,
      "rooms",
      roomId,
      "messages"
    ),

    {
      text,
      sender,
      uid: auth.currentUser.uid,
      time: Date.now()
    }

  );

}

/* 메시지 전송 */
window.sendMessage = async function () {

  const input =
    document.getElementById('input');

  const text = input.value.trim();

  if (!text) return;

  const roomId =
    localStorage.getItem('currentRoom');

  await saveRoomMessage(
    roomId,
    text,
    nickname
  );
  input.value = '';

};

/* 메시지 출력 */
window.addMessage = function (
  text,
  type,
  time
) {

  const messages =
    document.getElementById('messages');

  const div =
    document.createElement('div');

  div.className =
    `message ${type}`;

  div.innerHTML = `
    ${text}
    <small>${time}</small>
  `;

  messages.appendChild(div);

  messages.scrollTop =
    messages.scrollHeight;

};

/* 엔터 */
document
  .getElementById('input')
  .addEventListener('keydown', (e) => {

    if (e.key === 'Enter') {

      sendMessage();

    }

  });

/* 브라우저 종료 시 오프라인 처리 */
window.addEventListener("beforeunload", async () => {

      if(auth.currentUser){

          await setDoc(doc(db,"users",auth.currentUser.uid),{

              online:false

          },{merge:true});

      }

  });

</script>

</body>
</html>
